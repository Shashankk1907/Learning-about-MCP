services:
  mcp-server:
    build:
      context: ./2-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Use host networking to reach local Ollama
      - MCP_LLM__BASE_URL=http://host.docker.internal:11434
      - MCP_SERVER__HOST=0.0.0.0
      - MCP_SERVER__PORT=8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ui:
    build:
      context: .
      dockerfile: 2-server/Dockerfile # Uses same base environment
      # But we need to override the command and context for Streamlit.
      # Actually, since UI is simple, we'll just run it via Python.
    command: ["python", "-m", "streamlit", "run", "3-client/client_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - MCP_SERVER_URL=http://mcp-server:8080/sse
    depends_on:
      - mcp-server
